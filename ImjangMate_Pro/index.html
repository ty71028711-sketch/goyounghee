function formatMan(n) {
  if (!n && n !== 0) return "";
  const num = Number(String(n).replace(/[^0-9]/g, ""));
  if (isNaN(num) || num === 0) return "";
  return num.toLocaleString("ko-KR");
}
function getFormattedDate() {
  const d = new Date(), days=["일","월","화","수","목","금","토"];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
function getStatusStyle(status) {
  const m = {
    "가능":    { bg:"rgba(16,185,129,.10)",  color:"#059669", border:"rgba(16,185,129,.3)"  },
    "확인중":  { bg:"rgba(245,158,11,.10)",  color:"#d97706", border:"rgba(245,158,11,.3)"  },
    "방문완료":{ bg:"rgba(59,130,246,.10)",  color:"#2563eb", border:"rgba(59,130,246,.3)"  },
    "불가":    { bg:"rgba(239,68,68,.10)",   color:"#dc2626", border:"rgba(239,68,68,.3)"   },
  };
  return m[status] || { bg:"rgba(148,163,184,.1)", color:"#64748b", border:"rgba(148,163,184,.3)" };
}
function StatusIcon({ status }) {
  if (status==="가능"||status==="방문완료") return <IconCheck size={10}/>;
  if (status==="불가") return <IconX size={10}/>;
  if (status==="확인중") return <span style={{fontSize:9,fontWeight:800,lineHeight:1}}>?</span>;
  return null;
}
function formatSerial(raw) {
  const c = raw.replace(/[^A-Z0-9]/gi,"").toUpperCase().slice(0,16);
  const p=[]; for (let i=0;i<c.length;i+=4) p.push(c.slice(i,i+4));
  return p.join("-");
}
function validateSerial(serial) {
  const key = serial.trim().toUpperCase();
  const expiryStr = VALID_SERIALS[key];
  if (!expiryStr) return { valid:false };
  const today = new Date(); today.setHours(0,0,0,0);
  const expiry = new Date(expiryStr+"T23:59:59");
  const expired = today > expiry;
  return { valid:true, expired, expiryDate:expiryStr, daysLeft:Math.max(0, Math.ceil((expiry-today)/86400000)) };
}
function loadBusinessCard() {
  try {
    const s = localStorage.getItem("imjang_pro_card");
    return s ? JSON.parse(s) : { officeName:"", managerName:MANAGER_NAME, phone:CONTACT_PHONE, address:"", blog:"sojangnote.com" };
  } catch { return { officeName:"", managerName:MANAGER_NAME, phone:CONTACT_PHONE, address:"", blog:"sojangnote.com" }; }
}
function getPriceText(v) {
  const rt = v.rentalType || "jeonse";
  switch (v.dealType) {
    case "sale": return v.salePrice ? `매매 ${formatMan(v.salePrice)}만원` : "";
    case "rental":
    case "saleRightRental":
      if (rt === "jeonse") return v.jeonsePrice ? `전세 ${formatMan(v.jeonsePrice)}만원` : "";
      return [v.deposit?`보증금 ${formatMan(v.deposit)}만원`:"", v.monthlyRent?`월 ${formatMan(v.monthlyRent)}만원`:""].filter(Boolean).join(" / ");
    case "saleRight": {
      const t = (Number(v.basePrice)||0)+(Number(v.optionPrice)||0)+(Number(v.premium)||0);
      if (t === 0) return "";
      const pText = v.premium ? ` · P ${formatMan(v.premium)}만원` : "";
      return `총분양가 ${t.toLocaleString("ko-KR")}만원${pText}`;
    }
    default:
      if (v.jeonsePrice) return `전세 ${formatMan(v.jeonsePrice)}만원`;
      return [v.deposit?`보증금 ${formatMan(v.deposit)}만원`:"", v.monthlyRent?`월 ${formatMan(v.monthlyRent)}만원`:""].filter(Boolean).join(" / ");
  }
}
function formatPhone(raw) {
  const d = raw.replace(/[^0-9]/g, '').slice(0, 11);
  if (!d) return '';
  if (d.startsWith('02')) {
    if (d.length <= 2) return d;
    if (d.length <= 5) return `${d.slice(0,2)}-${d.slice(2)}`;
    if (d.length <= 9) return `${d.slice(0,2)}-${d.slice(2,5)}-${d.slice(5)}`;
    return `${d.slice(0,2)}-${d.slice(2,6)}-${d.slice(6)}`;
  }
  if (d.length <= 3) return d;
  if (d.length <= 6) return `${d.slice(0,3)}-${d.slice(3)}`;
  if (d.length <= 10) return `${d.slice(0,3)}-${d.slice(3,6)}-${d.slice(6)}`;
  return `${d.slice(0,3)}-${d.slice(3,7)}-${d.slice(7)}`;
}
function buildSmsMessage(sel, card, includeCard) {
  if (!sel.length) return "";
  const lines = sel.map((v,i) => {
    const price = getPriceText(v);
    const isH = v.category === "house";
    const area = isH
      ? [v.rooms&&`방${v.rooms}`, v.bathrooms&&`욕실${v.bathrooms}`].filter(Boolean).join("/")
      : [v.area, v.type].filter(Boolean).join("/");
    const loc = isH ? v.address : [v.dong,v.ho].filter(Boolean).join(" ");
    const mi = v.immediateMove ? "\n   📅 즉시 입주 가능" : v.negotiateMove ? "\n   📅 입주 협의 가능" : v.moveInDate ? `\n   📅 입주 가능 ${v.moveInDate.replace(/-/g,".")}` : "";
    return `${i+1}. ${v.apartmentName}${area?` (${area})`:""}\n   ${price}${mi}${loc?`\n   ${loc}`:""}`;
  }).join("\n\n");
  const name = card.managerName || MANAGER_NAME;
  let msg = `안녕하세요, ${name} 소장입니다.\n오늘 안내해 드린 매물 정보입니다.\n\n${lines}\n\n더 궁금하신 점은 편하게 연락 주세요 :)`;
  if (includeCard) {
    const parts=[];
    if (card.officeName)  parts.push(`🏢 ${card.officeName}`);
    if (card.managerName) parts.push(`👤 ${card.managerName} 소장`);
    if (card.phone)       parts.push(`📞 ${card.phone}`);
    if (card.address)     parts.push(`📍 ${card.address}`);
    if (card.blog)        parts.push(`🔗 ${card.blog}`);
    if (parts.length) msg += `\n\n──────────────\n${parts.join("\n")}`;
  } else { msg += "\n📝 sojangnote.com"; }
  return msg;
}

const PriceInput = memo(({ name, label, placeholder, value, onChange }) => {
  const [foc, setFoc] = useState(false);
  return (
    <div>
      <FLabel text={label}/>
      <div style={{position:"relative"}}>
        <input
          name={name} value={value} onChange={onChange}
          placeholder={placeholder} autoComplete="off" inputMode="numeric"

/* ══════════════════════════════════════════════════
   LICENSE GATE

function LicenseGate({ onActivate }) {
  const [serial,setSerial]=useState(""); const [errType,setErrType]=useState(null);
  const [errMsg,setErrMsg]=useState(""); const [sk,setSk]=useState(0);
  const inputRef=useRef(null);
  useEffect(()=>{ inputRef.current&&inputRef.current.focus(); },[]);
  function handleChange(e){ setSerial(formatSerial(e.target.value)); setErrType(null); setErrMsg(""); }
  function shake(t,m){ setErrType(t); setErrMsg(m); setSk(k=>k+1); }
  function handleSubmit(e){
    e.preventDefault();
    const r=validateSerial(serial);
    if (!r.valid){ shake("inv","유효하지 않은 시리얼 번호입니다."); return; }
    if (r.expired){ shake("exp",`사용 기간이 만료되었습니다.\n만료일: ${r.expiryDate.replace(/-/g,".")}\n연장 문의: ${CONTACT_PHONE}`); return; }
    localStorage.setItem("imjang_pro_serial",serial.trim().toUpperCase());
    onActivate({ serial:serial.trim().toUpperCase(), expiryDate:r.expiryDate, daysLeft:r.daysLeft });
  }
  return (
    <div className="lock-bg" style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ width:68,height:68,background:"linear-gradient(135deg,#f59e0b,#d97706)",borderRadius:20,display:"inline-flex",alignItems:"center",justifyContent:"center",boxShadow:"0 8px 28px rgba(245,158,11,.38)",marginBottom:14 }}>
            <IconBuilding size={34} color="white"/>
          </div>
          <h1 style={{ fontSize:22,fontWeight:800,color:"#1e293b",marginBottom:4,letterSpacing:"-0.5px" }}>임장메이트 <span style={{color:"#f59e0b"}}>PRO</span></h1>
          <p style={{ fontSize:12,color:"#94a3b8" }}>공인중개사 전용 매물 방문 관리</p>
        </div>
        <div style={{ background:"#fff",border:"1px solid #e2e8f0",borderRadius:18,padding:"28px 24px 24px",boxShadow:"0 4px 30px rgba(0,0,0,.07)" }}>
          <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:22,paddingBottom:18,borderBottom:"1px solid #f1f5f9" }}>
            <div style={{ width:36,height:36,background:"rgba(245,158,11,.10)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center" }}><IconKey size={18} color="#d97706"/></div>
            <div><div style={{fontWeight:700,fontSize:15}}>라이선스 활성화</div><div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>시리얼 번호를 입력하세요</div></div>
          </div>
          <form onSubmit={handleSubmit}>
            <label style={FL_STYLE}>시리얼 번호</label>
            <div key={`s${sk}`} className={sk>0?"shake":""}>
              <input ref={inputRef} value={serial} onChange={handleChange} placeholder="XXXX-XXXX-XXXX-XXXX" maxLength={19} autoComplete="off" spellCheck={false}
                style={{ width:"100%",background:errType?"rgba(254,242,242,.8)":"#f8fafc",border:`1.5px solid ${errType?"#fca5a5":"#e2e8f0"}`,color:errType?"#dc2626":"#1e293b",borderRadius:10,padding:"13px 16px",fontSize:16,fontWeight:700,letterSpacing:"2px",outline:"none",textAlign:"center",fontFamily:"'Courier New',monospace" }}/>
            </div>
            {errType&&(
              <div style={{marginTop:12,padding:"12px 14px",background:"rgba(239,68,68,.05)",border:"1px solid rgba(220,38,38,.2)",borderRadius:10,display:"flex",gap:10,alignItems:"flex-start"}}>
                <IconAlertCircle size={15} color="#dc2626"/><div style={{fontSize:12,color:"#dc2626",lineHeight:1.75,whiteSpace:"pre-line",fontWeight:500}}>{errMsg}</div>
              </div>
            )}
            <button type="submit" style={{width:"100%",marginTop:16,padding:"13px",background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"white",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7,boxShadow:"0 4px 16px rgba(245,158,11,.38)"}}>
              <IconShield size={15} color="white"/>활성화
            </button>
          </form>
        </div>
        <p style={{textAlign:"center",marginTop:18,fontSize:12,color:"#94a3b8"}}>구매 문의: <strong style={{color:"#64748b"}}>{CONTACT_PHONE}</strong></p>
      </div>
    </div>
  );
}

        </div>
      </div>
    </div>
  );
}

  const handleChange = useCallback((e) => {
    const { name, value } = e.target;
    setForm(p => ({ ...p, [name]: value }));
  }, []);

    setForm(p => ({
      ...p,
      category: newCat,
      dealType: VALID_DEALS[newCat].includes(p.dealType) ? p.dealType : DEFAULT_DEAL[newCat],

    (Number(form.basePrice)||0) + (Number(form.optionPrice)||0) + (Number(form.premium)||0),

              <TextInput name="bathrooms" label="욕실 수" placeholder="" value={form.bathrooms} onChange={handleChange}/>
              <div>
                <FLabel text="주차"/>
                <select name="parking" value={form.parking} onChange={handleChange} style={sS}>
                  <option value="가능">가능</option>
                  <option value="불가능">불가능</option>
                  <option value="협의">협의</option>
                </select>
              </div>
            </div>
          )}

          {/* ── 조건부 가격 입력 ── */}

          {/* 매매가 */}
          {form.dealType==="sale" && (
            <PriceInput name="salePrice" label="매매가 (만원)" placeholder="" value={form.salePrice} onChange={handleChange}/>
          )}

          {/* 전월세 서브 선택 */}
          {(form.dealType==="rental"||form.dealType==="saleRightRental") && (
            <div>
              <FLabel text="전세 / 월세 선택"/>
              <div style={{display:"flex",background:"#f1f5f9",borderRadius:9,padding:3,gap:3}}>
                {[["jeonse","전세"],["monthly","월세"]].map(([rt,lb])=>{
                  const a = form.rentalType===rt;
                  return (
                    <button key={rt} onClick={()=>setForm(p=>({...p,rentalType:rt}))} style={{flex:1,padding:"8px 6px",background:a?"#fff":"transparent",border:"none",borderRadius:7,fontSize:13,fontWeight:700,cursor:"pointer",color:a?"#1e293b":"#94a3b8",boxShadow:a?"0 1px 4px rgba(0,0,0,.10)":"none",transition:"all .15s"}}>
                      {lb}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* 전세가 */}
          {(form.dealType==="rental"||form.dealType==="saleRightRental") && form.rentalType==="jeonse" && (
            <PriceInput name="jeonsePrice" label="전세가 (만원)" placeholder="" value={form.jeonsePrice} onChange={handleChange}/>
          )}

          {/* 보증금 + 월세 */}
          {(form.dealType==="rental"||form.dealType==="saleRightRental") && form.rentalType==="monthly" && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <PriceInput name="deposit"     label="보증금 (만원)" placeholder="" value={form.deposit}     onChange={handleChange}/>
              <PriceInput name="monthlyRent" label="월세 (만원)"   placeholder="" value={form.monthlyRent} onChange={handleChange}/>
            </div>
          )}

          {/* 분양권매매 */}
          {form.dealType==="saleRight" && (
            <>
              <PriceInput name="basePrice"   label="분양가 (만원)"    placeholder="" value={form.basePrice}   onChange={handleChange}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <PriceInput name="optionPrice" label="옵션가 (만원)"   placeholder="" value={form.optionPrice} onChange={handleChange}/>
                <PriceInput name="premium"     label="프리미엄P (만원)" placeholder="" value={form.premium}     onChange={handleChange}/>
              </div>
              <div>
                <FLabel text="총분양가 (자동 계산)"/>
                <div style={{background:"rgba(37,99,235,.06)",border:`1.5px solid ${totalSaleRight>0?"rgba(37,99,235,.3)":"#e2e8f0"}`,borderRadius:9,padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontSize:18,fontWeight:800,color:totalSaleRight>0?"#2563eb":"#94a3b8"}}>
                      {totalSaleRight>0 ? `${totalSaleRight.toLocaleString("ko-KR")}만원` : "자동 계산됩니다"}
                    </div>
                    {totalSaleRight>0&&<div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>분양가 + 옵션가 + 프리미엄</div>}
                  </div>
                  {totalSaleRight>0&&<div style={{fontSize:12,fontWeight:700,color:"#2563eb"}}>= 총 {totalSaleRight.toLocaleString("ko-KR")}만</div>}
                </div>
              </div>
            </>
          )}

          {/* 오피스텔 체크박스 */}
          {showOffictel && (
            <div>
              <FLabel text="오피스텔 종류 (해당 시 선택)"/>
              <div style={{display:"flex",gap:16,padding:"8px 0"}}>
                {[["officetelResidential","주거용 오피스텔"],["officetelBusiness","업무용 오피스텔"]].map(([key,label]) => (
                  <label key={key} style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:13,fontWeight:600,color:form[key]?"#059669":"#64748b"}}>
                    <div onClick={()=>setForm(p=>({...p,[key]:!p[key]}))} style={{width:20,height:20,borderRadius:5,border:`2px solid ${form[key]?"#059669":"#d1d5db"}`,background:form[key]?"#059669":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s",cursor:"pointer",minWidth:20}}>
                      {form[key]&&<IconCheck size={11} color="white"/>}
                    </div>
                    {label}
                  </label>
                ))}
              </div>
            </div>
          )}

          {/* 입주가능일 + 즉시입주 + 입주협의 */}
          <div>
            <FLabel text="입주 가능일"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,alignItems:"center"}}>
              <input type="date" name="moveInDate"
                value={(form.immediateMove||form.negotiateMove)?"":form.moveInDate}
                disabled={form.immediateMove||form.negotiateMove}
                onChange={handleChange}
                style={{...BASE_INPUT,...((form.immediateMove||form.negotiateMove)?{opacity:.35,cursor:"not-allowed"}:{})}}/>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",whiteSpace:"nowrap"}}>
                  <div onClick={()=>setForm(p=>({...p,immediateMove:!p.immediateMove,negotiateMove:false,moveInDate:""}))} style={{width:20,height:20,borderRadius:5,border:`2px solid ${form.immediateMove?"#059669":"#d1d5db"}`,background:form.immediateMove?"#059669":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s",cursor:"pointer",minWidth:20}}>
                    {form.immediateMove&&<IconCheck size={11} color="white"/>}
                  </div>
                  <span style={{fontSize:13,fontWeight:600,color:form.immediateMove?"#059669":"#64748b"}}>즉시입주</span>
                </label>
                <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",whiteSpace:"nowrap"}}>
                  <div onClick={()=>setForm(p=>({...p,negotiateMove:!p.negotiateMove,immediateMove:false,moveInDate:""}))} style={{width:20,height:20,borderRadius:5,border:`2px solid ${form.negotiateMove?"#d97706":"#d1d5db"}`,background:form.negotiateMove?"#d97706":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s",cursor:"pointer",minWidth:20}}>
                    {form.negotiateMove&&<IconCheck size={11} color="white"/>}
                  </div>
                  <span style={{fontSize:13,fontWeight:600,color:form.negotiateMove?"#d97706":"#64748b"}}>입주협의</span>
                </label>
              </div>
            </div>
          </div>

          <TextInput  name="coBrokerAgency" label="공동중개사"       placeholder="" value={form.coBrokerAgency} onChange={handleChange}/>
          <PhoneInput name="coBrokerPhone"  label="공동중개사 연락처" placeholder="" value={form.coBrokerPhone}  onChange={handleChange}/>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div>
              <FLabel text="반려동물"/>
              <select name="hasPet" value={form.hasPet} onChange={handleChange} style={sS}>
                <option value="가능">가능</option><option value="불가능">불가능</option>
              </select>
            </div>
            <div>
              <FLabel text="약속 상태"/>
              <select name="appointmentStatus" value={form.appointmentStatus} onChange={handleChange} style={sS}>
                <option value="가능">가능</option><option value="확인중">확인중</option><option value="방문완료">방문완료</option><option value="불가">불가</option>
              </select>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <PhoneInput name="visitPhone" label="방문 연락처" placeholder="" value={form.visitPhone} onChange={handleChange}/>
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                <FLabel text="방문 시간"/>
                <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}>
                  <div onClick={()=>setForm(p=>({...p,isVacant:!p.isVacant}))}
                    style={{width:18,height:18,borderRadius:4,border:`2px solid ${form.isVacant?"#059669":"#d1d5db"}`,background:form.isVacant?"#059669":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s",cursor:"pointer",flexShrink:0}}>
                    {form.isVacant&&<IconCheck size={10} color="white"/>}
                  </div>
                  <span style={{fontSize:12,fontWeight:700,color:form.isVacant?"#059669":"#94a3b8",whiteSpace:"nowrap"}}>공실</span>
                </label>
              </div>
              <input type="time" name="visitTime" value={form.visitTime} onChange={handleChange} style={BASE_INPUT}/>
            </div>
          </div>

          <div>
            <FLabel text="메모"/>
            <textarea name="memo" value={form.memo} onChange={handleChange} placeholder="특이사항이나 메모를 입력하세요" rows={3}
              style={{...BASE_INPUT,resize:"vertical",minHeight:64,lineHeight:1.6}}/>
          </div>

          <button onClick={handleSubmit} style={{width:"100%",padding:"14px",background:isEdit?"linear-gradient(135deg,#2563eb,#1d4ed8)":"linear-gradient(135deg,#f59e0b,#d97706)",color:"white",border:"none",borderRadius:11,fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:isEdit?"0 4px 14px rgba(37,99,235,.35)":"0 4px 14px rgba(245,158,11,.35)",marginTop:4}}>
            {isEdit ? <IconCheck size={16} color="white"/> : <IconPlus size={16} color="white"/>}
            {isEdit ? "수정 저장" : "매물 등록 완료"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════════ */
function Header({ licenseInfo }) {
  const [time, setTime] = useState(new Date());
  useEffect(()=>{ const t=setInterval(()=>setTime(new Date()),1000); return ()=>clearInterval(t); },[]);
  const isWarn = licenseInfo && licenseInfo.daysLeft<=30;
  return (
    <header style={{background:"#fff",borderBottom:"1px solid #e2e8f0",height:54,display:"flex",alignItems:"center",padding:"0 16px",justifyContent:"space-between",flexShrink:0,boxShadow:"0 1px 8px rgba(0,0,0,.04)"}}>
      <div style={{display:"flex",alignItems:"center",gap:9}}>
        <div style={{width:34,height:34,background:"linear-gradient(135deg,#f59e0b,#d97706)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 10px rgba(245,158,11,.35)"}}>
          <IconBuilding size={18} color="white"/>
        </div>
        <div>
          <div style={{fontWeight:800,fontSize:15,letterSpacing:"-0.5px"}}>임장메이트 <span style={{color:"#f59e0b"}}>PRO</span></div>
          <div style={{fontSize:9,color:"#94a3b8"}}>공인중개사 전용</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {licenseInfo&&(
          <div title={`만료: ${licenseInfo.expiryDate.replace(/-/g,".")}`} style={{width:28,height:28,background:isWarn?"rgba(239,68,68,.07)":"rgba(16,185,129,.07)",border:`1px solid ${isWarn?"rgba(220,38,38,.25)":"rgba(16,185,129,.25)"}`,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            <IconShield size={13} color={isWarn?"#dc2626":"#059669"}/>
            {isWarn&&<span style={{position:"absolute",top:-3,right:-3,width:7,height:7,background:"#dc2626",borderRadius:"50%",border:"2px solid #fff"}}/>}
          </div>
        )}
        <div style={{background:"rgba(245,158,11,.06)",border:"1px solid rgba(245,158,11,.2)",borderRadius:7,padding:"4px 10px",fontSize:13,fontWeight:700,color:"#d97706",fontVariantNumeric:"tabular-nums"}}>
          {time.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",hour12:false})}
        </div>
      </div>
    </header>
  );
}

/* ══════════════════════════════════════════════════
   LIST VIEW
══════════════════════════════════════════════════ */
function ListView({ visits, selectedIds, onDelete, onEdit, onToggleSelect, sortMode, onSortToggle, onSelectAll, onDeselectAll }) {
  const allSel = visits.length>0 && selectedIds.size===visits.length;
  return (
    <div style={{overflowY:"auto",overflowX:"hidden",flex:1}}>
      <div style={{padding:"14px 14px 6px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
            <IconCalendar size={11} color="#f59e0b"/>
            <span style={{fontSize:11,color:"#64748b"}}>{getFormattedDate()}</span>
            <span className="pulse-dot" style={{width:6,height:6,background:"#10b981",borderRadius:"50%",display:"inline-block"}}/>
          </div>
          <h1 style={{fontSize:19,fontWeight:800,color:"#0f172a",letterSpacing:"-0.5px"}}>오늘의 투어 일정</h1>
        </div>
        <button onClick={()=>window.print()} className="no-print" style={{display:"flex",alignItems:"center",gap:5,padding:"7px 11px",background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.25)",color:"#d97706",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",minHeight:36}}>
          <IconPrinter size={13}/>출력
        </button>
      </div>
      <div style={{padding:"4px 14px 8px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
        <div style={{fontSize:12,color:"#64748b",flexShrink:0}}>
          총 <strong style={{color:"#1e293b"}}>{visits.length}</strong>건
          {selectedIds.size>0&&<span style={{color:"#2563eb",marginLeft:6,fontWeight:700}}>· {selectedIds.size}건 선택</span>}
        </div>
        <div style={{display:"flex",gap:6}}>
          {visits.length>0&&(
            <button onClick={allSel?onDeselectAll:onSelectAll} style={{padding:"5px 10px",background:allSel?"rgba(37,99,235,.08)":"#fff",border:`1px solid ${allSel?"rgba(37,99,235,.3)":"#e2e8f0"}`,color:allSel?"#2563eb":"#64748b",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer",minHeight:30}}>
              {allSel?"✓ 전체해제":"전체선택"}
            </button>
          )}
          <button onClick={onSortToggle} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",background:"#fff",border:"1px solid #e2e8f0",color:"#64748b",borderRadius:7,fontSize:11,fontWeight:500,cursor:"pointer",minHeight:30}}>
            <IconArrowUpDown size={11}/>{sortMode==="timeAsc"?"시간순":sortMode==="timeDesc"?"역순":"방문가능순"}
          </button>
        </div>
      </div>
      <div style={{padding:"0 11px 130px"}}>
        {visits.length===0?(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"56px 24px",background:"#fff",border:"1px dashed #e2e8f0",borderRadius:16,textAlign:"center"}}>
            <IconCalendar size={40} color="#e2e8f0"/>
            <p style={{marginTop:12,fontSize:14,color:"#94a3b8",fontWeight:500}}>아직 등록된 방문 일정이 없습니다</p>
            <p style={{marginTop:5,fontSize:12,color:"#cbd5e1"}}>하단 + 버튼을 눌러 매물을 추가해 주세요</p>
          </div>
        ):(
          visits.map((v,i)=>(
            <PropertyCard key={v.id} visit={v} index={i} onDelete={onDelete} onEdit={onEdit} isSelected={selectedIds.has(v.id)} onToggleSelect={onToggleSelect}/>
          ))
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   SMS COMPOSE PAGE
══════════════════════════════════════════════════ */
function SmsComposePage({ visits, selectedIds, onToggleSelect, businessCard, onGoToList }) {
  const [includeCard,   setIncludeCard]   = useState(false);
  const [customerPhone, setCustomerPhone] = useState("");
  const selectedVisits = visits.filter(v=>selectedIds.has(v.id));
  const smsMsg = buildSmsMessage(selectedVisits, businessCard, includeCard);
  const cardFilled = businessCard&&(businessCard.officeName||businessCard.phone||businessCard.address);

  function handleSend() {
    const phone = customerPhone.replace(/[^0-9+]/g,"");
    window.location.href = phone ? `sms:${phone}?body=${encodeURIComponent(smsMsg)}` : `sms:?body=${encodeURIComponent(smsMsg)}`;
  }

  return (
    <div style={{overflowY:"auto",overflowX:"hidden",flex:1}}>
      <div style={{padding:"14px 14px 6px"}}>
        <h2 style={{fontSize:19,fontWeight:800,color:"#0f172a",letterSpacing:"-0.5px"}}>안내 문자 전송</h2>
        <p style={{fontSize:12,color:"#94a3b8",marginTop:3}}>매물을 선택하고 고객에게 안내 문자를 보내세요</p>
      </div>
      {selectedVisits.length===0?(
        <div style={{margin:"12px 14px",display:"flex",flexDirection:"column",alignItems:"center",padding:"48px 24px",background:"#fff",borderRadius:16,textAlign:"center",boxShadow:"0 2px 14px rgba(0,0,0,.06)"}}>
          <IconMessage size={44} color="#e2e8f0"/>
          <p style={{marginTop:14,fontSize:15,color:"#64748b",fontWeight:700}}>선택된 매물이 없습니다</p>
          <p style={{marginTop:5,fontSize:13,color:"#94a3b8"}}>전체 매물 탭에서 매물 카드의<br/>체크박스를 눌러 선택해 주세요</p>
          <button onClick={onGoToList} style={{marginTop:18,padding:"10px 22px",background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"white",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>
            → 매물 목록으로 이동
          </button>
        </div>
      ):(
        <div style={{padding:"6px 14px 130px",display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:"#fff",borderRadius:14,overflow:"hidden",boxShadow:"0 2px 14px rgba(0,0,0,.05)"}}>
            <div style={{padding:"11px 14px",borderBottom:"1px solid #f1f5f9",background:"#f8fafc"}}>
              <span style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.5px"}}>선택된 매물 ({selectedVisits.length}건)</span>
            </div>
            {selectedVisits.map(v=>(
              <div key={v.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:"1px solid #f8fafc"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v.apartmentName}</div>
                  <div style={{fontSize:12,color:"#2563eb",marginTop:1}}>{getPriceText(v)}</div>
                </div>
                <button onClick={()=>onToggleSelect(v.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",padding:6,minWidth:28,minHeight:28,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <IconX size={14}/>
                </button>
              </div>
            ))}
          </div>

          <div style={{background:"#fff",borderRadius:14,padding:"14px",boxShadow:"0 2px 14px rgba(0,0,0,.05)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:"#0f172a"}}>명함 정보 포함</div>
                <div style={{fontSize:12,color:"#94a3b8",marginTop:2,lineHeight:1.4}}>
                  {cardFilled?"부동산 정보를 메시지 하단에 추가합니다":"설정 탭에서 명함 정보를 먼저 입력해 주세요"}
                </div>
              </div>
              <div onClick={()=>setIncludeCard(p=>!p)} style={{width:48,height:26,background:includeCard?"#2563eb":"#e2e8f0",borderRadius:13,position:"relative",cursor:"pointer",transition:"background .2s",flexShrink:0}}>
                <div style={{position:"absolute",top:3,left:includeCard?25:3,width:20,height:20,background:"#fff",borderRadius:"50%",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/>
              </div>
            </div>
            {includeCard&&cardFilled&&(
              <div style={{marginTop:12,padding:"10px 12px",background:"#f8fafc",borderRadius:9,fontSize:12,color:"#64748b",lineHeight:2}}>
                {businessCard.officeName &&<div>🏢 {businessCard.officeName}</div>}
                {businessCard.managerName&&<div>👤 {businessCard.managerName} 소장</div>}
                {businessCard.phone      &&<div>📞 {businessCard.phone}</div>}
                {businessCard.address    &&<div>📍 {businessCard.address}</div>}
                {businessCard.blog       &&<div>🔗 {businessCard.blog}</div>}
              </div>
            )}
          </div>

          <div style={{background:"#fff",borderRadius:14,padding:"14px",boxShadow:"0 2px 14px rgba(0,0,0,.05)"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#94a3b8",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.5px"}}>메시지 미리보기</div>
            <div style={{background:"#f1f5f9",borderRadius:12,padding:"12px 13px",fontSize:12.5,color:"#374151",lineHeight:1.8,whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:220,overflowY:"auto",fontFamily:"monospace"}}>
              {smsMsg}
            </div>
          </div>

          <div style={{background:"#fff",borderRadius:14,padding:"14px",boxShadow:"0 2px 14px rgba(0,0,0,.05)"}}>

      )}
    </div>
  );
}

    { id:"sms",      Icon:IconMessage,  label:"문자 전송", badge:selectedCount },
    { id:"settings", Icon:IconSettings, label:"설정" },

  return (

      {tabs.map(({id,Icon,label,badge})=>{
        const active = currentTab===id;
        return (
          <button key={id} onClick={()=>onTabChange(id)} style={{flex:1,padding:"10px 8px 8px",background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",color:active?"#f59e0b":"#94a3b8",transition:"color .15s",position:"relative",minHeight:58}}>
            {badge>0&&<span style={{position:"absolute",top:6,right:"22%",background:"#2563eb",color:"white",fontSize:9,fontWeight:700,width:16,height:16,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{badge}</span>}

      })}

  );
}

/* ══════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════ */
function MainApp({ licenseInfo, onLogout }) {
  const [visits,        setVisits]       = useState(INITIAL_VISITS);
  const [selectedIds,   setSelectedIds]  = useState(new Set());
  const [sortMode,      setSortMode]     = useState("timeAsc");
  const [currentTab,    setCurrentTab]   = useState("list");
  const [showModal,     setShowModal]    = useState(false);
  const [editingVisit,  setEditingVisit] = useState(null);
  const [businessCard,  setBusinessCard] = useState(()=>loadBusinessCard());

  function openAddModal()  { setEditingVisit(null); setShowModal(true); }
  function openEditModal(v){ setEditingVisit(v);    setShowModal(true); }
  function closeModal()    { setShowModal(false);   setEditingVisit(null); }

  function handleSave(data) {
    if (editingVisit) {
      setVisits(p => p.map(v => v.id === data.id ? data : v));
    } else {
      setVisits(p => [...p, data]);
    }
    closeModal();
  }
  function deleteVisit(id){
    setVisits(p=>p.filter(v=>v.id!==id));
    setSelectedIds(prev=>{ const n=new Set(prev); n.delete(id); return n; });
  }
  function toggleSelect(id){
    setSelectedIds(prev=>{ const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
  }
  function toggleSort(){
    setSortMode(m=>m==="timeAsc"?"timeDesc":m==="timeDesc"?"available":"timeAsc");
  }

  /* ★ useMemo: 정렬 결과 메모이제이션 */
  const sortedVisits = useMemo(() => [...visits].sort((a,b)=>{
    if (sortMode==="available"){
      const aA=a.appointmentStatus==="가능"?0:1, bA=b.appointmentStatus==="가능"?0:1;
      if (aA!==bA) return aA-bA;
    }
    if (!a.visitTime) return 1;
    if (!b.visitTime) return -1;
    return sortMode==="timeDesc"?b.visitTime.localeCompare(a.visitTime):a.visitTime.localeCompare(b.visitTime);
  }), [visits, sortMode]);

  return (
    <div className="app-root" style={{maxWidth:560,margin:"0 auto",height:"100vh",display:"flex",flexDirection:"column",background:"#f1f5f9",position:"relative",overflow:"hidden"}}>
      <Header licenseInfo={licenseInfo}/>

      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {currentTab==="list"     && <ListView visits={sortedVisits} selectedIds={selectedIds} onDelete={deleteVisit} onEdit={openEditModal} onToggleSelect={toggleSelect} sortMode={sortMode} onSortToggle={toggleSort} onSelectAll={()=>setSelectedIds(new Set(visits.map(v=>v.id)))} onDeselectAll={()=>setSelectedIds(new Set())}/>}
        {currentTab==="sms"      && <SmsComposePage visits={visits} selectedIds={selectedIds} onToggleSelect={toggleSelect} businessCard={businessCard} onGoToList={()=>setCurrentTab("list")}/>}
        {currentTab==="settings" && <SettingsPage licenseInfo={licenseInfo} onLogout={onLogout} businessCard={businessCard} onCardChange={setBusinessCard}/>}
      </div>

      <BottomNav currentTab={currentTab} onTabChange={setCurrentTab} selectedCount={selectedIds.size}/>

      {currentTab==="list" && (
        <button className="no-print" onClick={openAddModal} style={{position:"absolute",right:18,bottom:74,width:54,height:54,background:"linear-gradient(135deg,#f59e0b,#d97706)",border:"none",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 6px 24px rgba(245,158,11,.55)",cursor:"pointer",zIndex:90}}>
          <IconPlus size={26} color="white"/>
        </button>
      )}

      {showModal && (
        <PropertyModal
          initialData={editingVisit}
          onSave={handleSave}
          onClose={closeModal}
        />
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   APP (최상위)
══════════════════════════════════════════════════ */
function App() {
  const [licenseInfo, setLicenseInfo] = useState(null);
  const [ready,       setReady]       = useState(false);
  useEffect(()=>{
    const saved = localStorage.getItem("imjang_pro_serial");
    if (saved){ const r=validateSerial(saved); if(r.valid&&!r.expired){ setLicenseInfo({serial:saved,expiryDate:r.expiryDate,daysLeft:r.daysLeft}); } else { localStorage.removeItem("imjang_pro_serial"); } }
    setReady(true);
  },[]);
  function handleActivate(info){ setLicenseInfo(info); }
  function handleLogout(){
    if(confirm("라이선스를 해제하면 시리얼 번호를 다시 입력해야 합니다.\n계속하시겠습니까?")){ localStorage.removeItem("imjang_pro_serial"); setLicenseInfo(null); }
  }
  if (!ready) return null;
  if (!licenseInfo) return <LicenseGate onActivate={handleActivate}/>;
  return <MainApp licenseInfo={licenseInfo} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
